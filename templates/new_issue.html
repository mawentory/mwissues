{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <h2 class="mb-4">New Issue</h2>

    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold" for="title">Title <span class="text-danger">*</span></label>
        <input type="text" id="title" name="title" class="form-control"
               value="{{ flask.request.form.get('title', '') }}" required autofocus>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold" for="description">Description <span class="text-danger">*</span></label>
        <textarea id="description" name="description" class="form-control"
                  rows="3">{{ flask.request.form.get('description', '') }}</textarea>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold" for="details">Details</label>
        <textarea id="details" name="details" class="form-control"
                  rows="5" placeholder="Steps to reproduce, notes, additional context…">{{ flask.request.form.get('details', '') }}</textarea>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold" for="priority">Priority <span class="text-danger">*</span></label>
        <select id="priority" name="priority" class="form-select" required>
          <option value="">Select priority…</option>
          <option value="A" {% if flask.request.form.get('priority') == 'A' %}selected{% endif %}>A — Must Do</option>
          <option value="B" {% if flask.request.form.get('priority') == 'B' %}selected{% endif %}>B — Should Do</option>
          <option value="C" {% if flask.request.form.get('priority') == 'C' %}selected{% endif %}>C — Nice to Do</option>
          <option value="D" {% if flask.request.form.get('priority') == 'D' %}selected{% endif %}>D — Think about</option>
          <option value="E" {% if flask.request.form.get('priority') == 'E' %}selected{% endif %}>E — Eliminate</option>
        </select>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Create Issue</button>
        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
